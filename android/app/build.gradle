plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android & Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Firebase
    id "com.google.gms.google-services"
}

android {
    namespace = "com.nooralduha.noor_teacher_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // ← غيّر هذا المعرّف لكل معهد إن أردت نشر تطبيق منفصل
        applicationId = "com.nooralduha.noor_teacher_app"
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
    }

    buildTypes {
        release {
            // للإصدار الحقيقي أنشئ key.properties ووقّع التطبيق (انظر README).
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation platform("com.google.firebase:firebase-bom:33.5.1")
}
