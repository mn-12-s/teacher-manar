name: noor_teacher_app
description: "بوابة المدرسين — تطبيق إدارة الحضور ونسب المدرسين (متعدد المعاهد)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.2

  # Local storage / login persistence + dynamic Firebase config
  shared_preferences: ^2.3.2

  # WhatsApp / external links
  url_launcher: ^6.3.1

  # Number & date formatting (تُترك مرنة لتوافق إصدار flutter_localizations)
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # App icon + native splash generation
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ── أيقونة التطبيق ──────────────────────────────────
# بعد وضع شعارك في assets/images/logo.png شغّل:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#1a3a5c"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

# ── شاشة الافتتاح (Splash) ──────────────────────────
# بعد ضبط الشعار شغّل:
#   flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#1a3a5c"
  image: assets/images/logo.png
  android_12:
    color: "#1a3a5c"
    image: assets/images/logo.png
